{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - Daisyglams</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            pink: { light: '#fff0f5', soft: '#ffcce0', main: '#ff69b4', deep: '#d63384' },
            purple: { light: '#f3e5f5', soft: '#ce93d8', main: '#9c27b0', deep: '#6a1b9a' },
            inkdark: '#2d1b4e', inkmed: '#5d4e6d', inklight: '#9b8aa5',
          },
          fontFamily: {
            serif: ['Playfair Display', 'serif'],
            sans: ['Poppins', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    body { background: #faf8ff; font-family: 'Poppins', sans-serif; }
    .text-gradient { background: linear-gradient(135deg, #ff69b4, #9c27b0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .form-input { width: 100%; background: rgba(255,255,255,0.7); border: 1px solid rgba(156,39,176,0.2); border-radius: 12px; padding: 12px 16px; color: #2d1b4e; font-family: 'Poppins', sans-serif; font-size: 0.9rem; outline: none; transition: all 0.3s; }
    .form-input:focus { border-color: rgba(156,39,176,0.5); box-shadow: 0 0 0 3px rgba(156,39,176,0.1); background: #ffffff; }
    .form-input::placeholder { color: #9b8aa5; }
    @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
    .btn-shimmer { background: linear-gradient(90deg, #d63384, #ff69b4, #9c27b0, #ff69b4, #d63384); background-size: 200% auto; animation: shimmer 3s linear infinite; transition: transform 0.2s, box-shadow 0.2s; }
    .btn-shimmer:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(156,39,176,0.35); }
    .orb { border-radius: 50%; filter: blur(80px); position: absolute; pointer-events: none; }
  </style>
</head>
<body class="text-inkdark min-h-screen flex items-center justify-center relative overflow-hidden">

  <div class="orb w-80 h-80 bg-purple-main opacity-20 top-0 right-0"></div>
  <div class="orb w-64 h-64 bg-pink-main opacity-15 bottom-0 left-0"></div>

  <div class="relative z-10 w-full max-w-md mx-auto px-6">

    <!-- Logo -->
    <div class="text-center mb-10">
      <div class="w-16 h-16 rounded-full flex items-center justify-center text-white font-bold text-2xl mx-auto mb-4" style="background: linear-gradient(135deg, #ff69b4, #9c27b0); box-shadow: 0 0 30px rgba(156,39,176,0.3);">
        <img src="{% static 'images/Daisy_New_Logo.png' %}" alt="Daisyglams Logo">
      </div>
      <h1 class="font-serif text-3xl font-bold">
        <span class="text-gradient">Daisy</span><span class="text-inkdark">glams</span>
      </h1>
      <p class="text-inklight text-sm mt-1">Admin Portal</p>
    </div>

    <!-- Card -->
    <div style="background: rgba(255,255,255,0.8); border: 1px solid rgba(156,39,176,0.2); border-radius: 24px; padding: 32px; box-shadow: 0 8px 30px rgba(156,39,176,0.12);">

      <h2 class="font-serif text-xl font-bold text-inkdark mb-1">Welcome back <i class="fas fa-hand-wave"></i></h2>
      <p class="text-inklight text-sm mb-6">Sign in to manage your bookings & designs.</p>

      {% if messages %}
        {% for message in messages %}
        <div class="text-red-600 text-sm p-3 rounded-xl mb-4" style="background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25);">
          <i class="fas fa-triangle-exclamation"></i> {{ message }}
        </div>
        {% endfor %}
      {% endif %}

      <form method="POST" class="space-y-4">
        {% csrf_token %}
        <div>
          <label class="block text-xs text-inklight uppercase tracking-widest font-medium mb-2">Username</label>
          <input type="text" name="username" id="username" placeholder="Enter your username" class="form-input" required autofocus />
        </div>
        <div>
          <label class="block text-xs text-inklight uppercase tracking-widest font-medium mb-2">Password</label>
          <div class="relative">
            <input type="password" name="password" id="password" placeholder="Enter your password" class="form-input pr-10" required />
            <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-inklight hover:text-purple-main transition-colors">
              <svg id="eye-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-shimmer w-full text-white font-bold py-3.5 rounded-xl text-sm mt-2">
          Sign In to Dashboard →
        </button>
      </form>

    </div>

    <p class="text-center text-inklight text-xs mt-6">
      <a href="{% url 'core:home' %}" class="hover:text-purple-main transition-colors">← Back to website</a>
    </p>

  </div>

  <script>
      function togglePassword() {
          const input = document.getElementById('password');
          input.type = input.type === 'password' ? 'text' : 'password';
      }
  </script>
</body>
</html>
